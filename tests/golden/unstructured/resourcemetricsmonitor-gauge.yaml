name: resourcemetricsmonitor-todo
description: >
  Sanity test to ensure metrics are generated for multiple RMMs.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-todo
    namespace: default
  spec:
    configuration:
      stores:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          resolver: unstructured
          families:
            - name: "bars_information"
              help: "Information about each Bar instance"
              metrics:
                - labels: []
                  value: "metadata.labels.bar"
                - labels:
                    - name: "environmentType"
                      value: "spec.environmentType"
                    - name: "language"
                      value: "spec.language"
                  value: "metadata.labels.foo"
metrics:
  - '# HELP kube_customresource_bars_information Information about each Bar instance'
  - '# TYPE kube_customresource_bars_information gauge'
  - 'kube_customresource_bars_information{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 2.000000'
  - 'kube_customresource_bars_information{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 0.000000'
  - 'kube_customresource_bars_information{environment_type="dev",language="csharp",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 1.000000'
  - 'kube_customresource_bars_information{environment_type="dev",language="csharp",group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 0.000000'
status:
  cardinality:
    total: 4
    thresholdsExceeded: false
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "False"
      reason: CardinalityOK
    - type: CardinalityWarning
      status: "False"
      reason: CardinalityOK
