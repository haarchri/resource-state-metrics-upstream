name: resourcemetricsmonitor-starlark-basic
description: >
  Basic test for Starlark-based metric generation.
in:
  apiVersion: resource-state-metrics.instrumentation.k8s-sigs.io/v1alpha1
  kind: ResourceMetricsMonitor
  metadata:
    name: resourcemetricsmonitor-starlark-basic
    namespace: default
  spec:
    configuration:
      stores:
        - group: "samplecontroller.k8s.io"
          version: "v1beta1"
          kind: "Bar"
          resource: "bars"
          families:
            - name: "starlark_info"
              help: "Information generated via Starlark"
              resolver: starlark
              starlark:
                script: |
                  samples = [
                      metric(
                          labels={},
                          value=1.0
                      )
                  ]
                  families = [
                      family(
                          name="starlark_info",
                          help="Information generated via Starlark",
                          kind="gauge",
                          samples=samples
                      )
                  ]
metrics:
  - '# HELP kube_customresource_starlark_info Information generated via Starlark'
  - '# TYPE kube_customresource_starlark_info gauge'
  - 'kube_customresource_starlark_info{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample",namespace="default"} 1.000000'
  - 'kube_customresource_starlark_info{group="samplecontroller.k8s.io",version="v1beta1",kind="Bar",name="test-sample-secondary",namespace="default"} 1.000000'
status:
  cardinality:
    total: 2
    thresholdsExceeded: false
  conditions:
    - type: Processed
      status: "True"
      reason: EventHandlerSucceeded
    - type: CardinalityCutoff
      status: "False"
      reason: CardinalityOK
    - type: CardinalityWarning
      status: "False"
      reason: CardinalityOK
